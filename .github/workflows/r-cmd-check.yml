name: r-cmd-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: "release" }
          - { os: macos-latest,   r: "release" }
          - { os: windows-latest, r: "release" }
    env:
      R_KEEP_PKG_SOURCE: yes
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      # R CMD check copies the package to a tempdir, so `configure`'s
      # `../../Cargo.toml` parent-workspace lookup misses. Vendor the Rust
      # source into r-package/SpeedDada/src/rust/ first so the copy is
      # self-contained.
      - name: Vendor Rust source into the R package
        shell: bash
        run: bash tools/vendor-r-rust.sh

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-package/SpeedDada
          extra-packages: |
            any::rcmdcheck
            any::BiocCheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r-package/SpeedDada
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
