name: wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ─── Linux x86_64 + i686 ───────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, i686]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          sccache: true
          manylinux: auto
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/speeddada-py/dist

  # ─── Linux aarch64 (Raspberry Pi etc.) ────────────────────────────────────
  linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build aarch64 wheels (QEMU)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-gnu
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          sccache: true
          manylinux: auto
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: crates/speeddada-py/dist

  # ─── macOS universal2 (Intel x86_64 + Apple Silicon arm64) ─────────────────
  # Single wheel built on macos-14 (Apple Silicon) that contains binaries
  # for both x86_64 and aarch64. This avoids the macos-13 (Intel) runner
  # queue, which is heavily oversubscribed on free-tier orgs and held the
  # whole release job in `queued` for over an hour.
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build universal2 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          sccache: true
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-universal2
          path: crates/speeddada-py/dist

  # ─── Windows x86_64 ────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          sccache: true
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: crates/speeddada-py/dist

  # ─── Source distribution ───────────────────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/speeddada-py/dist

  # ─── Build the R source tarball (vendored Rust src) on tag ────────────────
  r-tarball:
    name: Build R source tarball
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-pandoc@v2
      - name: Install R dependencies for vignette build
        run: |
          Rscript -e 'install.packages(c("knitr","rmarkdown"), repos="https://cloud.r-project.org")'
      - name: Vendor Rust crates into r-package/SpeedDada/src/rust
        run: bash tools/vendor-r-rust.sh
      - name: Build source tarball
        run: R CMD build r-package/SpeedDada
      - uses: actions/upload-artifact@v4
        with:
          name: r-source-tarball
          path: SpeedDada_*.tar.gz

  # ─── Attach Python wheels + sdist + R tarball to the GitHub Release ───────
  # Users install via `pip install <wheel-url>` /
  # `install.packages(<tarball-url>, repos = NULL)` until PyPI + Bioconductor
  # publishing are enabled. To switch the Python publish target to PyPI,
  # restore the previous `release: Release to PyPI` job (see git history)
  # and configure a Trusted Publisher on pypi.org pointing at this repo +
  # wheels.yml + the `pypi` environment.
  release:
    name: Attach wheels + R tarball to GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, linux-aarch64, macos, windows, sdist, r-tarball]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List built artefacts
        run: ls -la dist/
      - name: Upload wheels + sdist + R tarball to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create the release if it doesn't exist yet, then attach assets.
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "speed-dada ${GITHUB_REF_NAME}" \
              --notes-file CHANGELOG.md \
              --verify-tag
          fi
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
