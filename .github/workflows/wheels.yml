name: wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Required for OIDC PyPI Trusted Publishing.
permissions:
  contents: read
  id-token: write

jobs:

  # ─── Linux x86_64 + i686 ───────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, i686]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          sccache: true
          manylinux: auto
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/speeddada-py/dist

  # ─── Linux aarch64 (Raspberry Pi etc.) ────────────────────────────────────
  linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build aarch64 wheels (QEMU)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-gnu
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          sccache: true
          manylinux: auto
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: crates/speeddada-py/dist

  # ─── macOS x86_64 + arm64 ──────────────────────────────────────────────────
  macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-13   # Intel
            target: x86_64-apple-darwin
          - runner: macos-14   # Apple Silicon
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          sccache: true
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: crates/speeddada-py/dist

  # ─── Windows x86_64 ────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          sccache: true
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: crates/speeddada-py/dist

  # ─── Source distribution ───────────────────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/speeddada-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/speeddada-py/dist

  # ─── Publish to PyPI on tag (OIDC trusted publishing) ──────────────────────
  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, linux-aarch64, macos, windows, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/speeddada
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
